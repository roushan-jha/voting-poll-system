<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-semibold py-2 px-3 mb-0">MyVote | Voting Poll System</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createPollModal">
      + Create Poll
    </button>
  </div>

  <div *ngIf="polls().length === 0" class="text-center text-muted py-5">
    No polls available yet.
  </div>

  <div class="row g-3">
    <div *ngFor="let poll of polls(); trackBy: trackByPollId" class="col-12 col-md-6 col-lg-4">
      <div class="card h-100 shadow-sm border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h5 class="card-title mb-0">{{ poll.question }}</h5>
            <button
              class="btn btn-sm btn-outline-danger"
              (click)="deletePoll(poll.id)"
              title="Delete poll"
            >
              &times;
            </button>
          </div>

          <div class="d-flex flex-column gap-2">
            <button
              *ngFor="let option of poll.options; let i = index; trackBy: trackByIndex"
              (click)="vote(poll.id, i)"
              class="btn btn-outline-primary d-flex justify-content-between align-items-center px-3 py-2"
            >
              <span>{{ option.optionText }}</span>
              <span class="badge bg-primary rounded-pill">{{ option.voteCount }}</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create Poll Modal -->
<div class="modal fade" id="createPollModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create a New Poll</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Question</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="newPoll.question"
            placeholder="Enter poll question"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Number of Options</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="optionCount"
            (ngModelChange)="onOptionCountChange()"
            min="2"
            max="10"
          />
        </div>

        <div
          class="mb-2"
          *ngFor="let option of newPoll.options; let i = index; trackBy: trackByIndex"
        >
          <label class="form-label">Option {{ i + 1 }}</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="newPoll.options[i]"
            placeholder="Option {{ i + 1 }} text"
          />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="createPoll()">Create</button>
      </div>
    </div>
  </div>
</div>
